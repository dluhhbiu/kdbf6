name: Build Electron App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm ci

      - name: Generate 256x256 icon
        run: magick favicon.png -resize 256x256 -alpha on PNG32:icon.png

      - name: Build Electron app
        run: npm run build

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: BF6-Stats-Portable
          path: dist/BF6-Stats-Portable.exe
