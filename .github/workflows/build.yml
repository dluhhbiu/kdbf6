name: Build Electron App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm ci

      - name: Generate 256x256 icon
        run: magick favicon.png -resize 256x256 -alpha on PNG32:icon.png

      - name: Build Electron app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BF6-Stats-Portable
          path: dist/BF6-Stats-Portable.exe

      - name: Create/update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Portable .exe — download and run, no installation needed."
          prerelease: true
          files: dist/BF6-Stats-Portable.exe
