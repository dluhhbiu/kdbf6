name: Build Tauri App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons from favicon
        run: |
          magick favicon.png -resize 256x256 -alpha on PNG32:src-tauri/icons/icon.png
          magick favicon.png -resize 256x256 -alpha on src-tauri/icons/icon.ico

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Find portable exe
        run: |
          Get-ChildItem -Path src-tauri/target/release -Filter "*.exe" -File | Where-Object { $_.Name -notmatch "build" } | ForEach-Object { Write-Output $_.FullName }
        shell: pwsh

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: BF6-Stats-Portable
          path: |
            src-tauri/target/release/BF6 Stats.exe
            src-tauri/target/release/BF6-Stats.exe
            src-tauri/target/release/bf6-stats.exe
