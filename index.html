<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF6 Stats Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 50%, #0d1117 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .hero-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0,212,255,0.15);
        }
        .player-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
        }
        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .stat-kd-all { color: #f0883e; }
        .stat-kd-human { color: #d2a8ff; }
        .stat-accuracy { color: #3fb950; }
        .stat-tip {
            cursor: help;
            border-bottom: 1px dotted #8b949e;
        }
        .avatar-img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(0,212,255,0.4);
            object-fit: cover;
        }
        .update-badge {
            font-size: 0.75rem;
            color: #8b949e;
        }
        .spinner-container {
            min-height: 200px;
        }
        .input-glow:focus {
            border-color: #7b2ff7;
            box-shadow: 0 0 0 0.2rem rgba(123,47,247,0.25);
        }
        .error-card {
            background: rgba(248,81,73,0.1);
            border-color: rgba(248,81,73,0.3);
        }
        .error-card .player-name {
            color: #f85149;
        }
        .fav-weapon {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            color: #6e7681;
            font-size: 0.8rem;
        }
        .fav-weapon .weapon-name {
            color: #8b949e;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .fav-weapon img {
            height: 32px;
            filter: brightness(0.7);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-4">
            <h1 class="hero-title">BF6 Stats Tracker</h1>
            <p class="text-secondary">Real-time Battlefield 6 player statistics</p>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-lg-8">
                <div class="input-group input-group-lg">
                    <input type="text" id="nicknames" class="form-control bg-dark text-light input-glow"
                           placeholder="Enter nicknames separated by commas"
                           value="dluhhbiu, just_kip, vladeskos">
                    <button class="btn btn-outline-info" id="btn-load" type="button">Load</button>
                </div>
                <div class="text-end mt-2">
                    <span class="update-badge" id="last-update"></span>
                </div>
            </div>
        </div>

        <div id="stats-container" class="row g-4 justify-content-center"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'https://api.gametools.network/bf6/stats/?platform=pc&name=';
        const REFRESH_INTERVAL = 30000;
        let refreshTimer = null;

        function getNicknames() {
            return document.getElementById('nicknames').value
                .split(',')
                .map(n => n.trim())
                .filter(n => n.length > 0);
        }

        async function fetchPlayer(name) {
            const res = await fetch(API_BASE + encodeURIComponent(name));
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (data.errors) throw new Error(data.errors[0] || 'Player not found');
            return data;
        }

        function renderCard(data) {
            const kdHuman = data.deaths ? (data.kills / data.deaths).toFixed(3) : '—';
            const allGroup = (data.gameModeGroups || []).find(g => g.gamemodeName === 'All');
            const kdAll = allGroup && allGroup.deaths ? (allGroup.kills / allGroup.deaths).toFixed(3) : kdHuman;
            return `
                <div class="col-md-6 col-xl-4">
                    <div class="stat-card p-4 h-100">
                        <div class="d-flex align-items-center mb-3 gap-3">
                            ${data.avatar ? `<img src="${data.avatar}" class="avatar-img" alt="">` : ''}
                            <div>
                                <div class="player-name">${escapeHtml(data.userName)}</div>
                                <div class="text-secondary" style="font-size:0.85rem">
                                    ${data.matchesPlayed ?? 0} matches &middot; ${formatHours(data.secondsPlayed)}
                                </div>
                            </div>
                        </div>
                        <div class="row text-center g-3">
                            <div class="col-6">
                                <div class="stat-label">K/D (All)</div>
                                <div class="stat-value stat-kd-all">${kdAll}</div>
                            </div>
                            <div class="col-6">
                                <div class="stat-label">K/D (Humans)</div>
                                <div class="stat-value stat-kd-human">${kdHuman}</div>
                            </div>
                            <div class="col-6">
                                <div class="stat-label">Accuracy</div>
                                <div class="stat-value stat-accuracy">${data.accuracy ?? '—'}</div>
                            </div>
                        </div>
                        ${renderFavWeapon(data.weapons)}
                    </div>
                </div>`;
        }

        function formatHours(seconds) {
            if (!seconds) return '—';
            const h = Math.round(seconds / 3600);
            return h.toLocaleString() + 'h';
        }

        function renderFavWeapon(weapons) {
            if (!weapons || !weapons.length) return '';
            const w = weapons.reduce((best, cur) => (cur.kills > best.kills ? cur : best), weapons[0]);
            return `
                <div class="fav-weapon mt-3 p-2 d-flex align-items-center gap-2">
                    ${w.image ? `<img src="${w.image}" alt="">` : ''}
                    <div>
                        <div class="stat-label mb-1">Favorite Weapon</div>
                        <div class="weapon-name">${escapeHtml(w.weaponName)}</div>
                        <span><span class="stat-tip" data-bs-toggle="tooltip" data-bs-title="Kills">${(w.kills ?? 0).toLocaleString()} kills</span> &middot; <span class="stat-tip" data-bs-toggle="tooltip" data-bs-title="Accuracy">${w.accuracy || '—'} acc</span> &middot; <span class="stat-tip" data-bs-toggle="tooltip" data-bs-title="Headshots">${w.headshots || '—'} hs</span></span>
                    </div>
                </div>`;
        }

        function renderError(name, msg) {
            return `
                <div class="col-md-6 col-xl-4">
                    <div class="stat-card error-card p-4 h-100">
                        <div class="player-name mb-2">${escapeHtml(name)}</div>
                        <p class="text-secondary mb-0">${escapeHtml(msg)}</p>
                    </div>
                </div>`;
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        async function loadAll() {
            const names = getNicknames();
            const container = document.getElementById('stats-container');

            if (names.length === 0) {
                container.innerHTML = '<p class="text-center text-secondary">Enter at least one nickname above.</p>';
                return;
            }

            // Show spinner only on first load (empty container)
            if (!container.children.length) {
                container.innerHTML = `
                    <div class="spinner-container d-flex justify-content-center align-items-center">
                        <div class="spinner-border text-info" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>`;
            }

            const results = await Promise.allSettled(names.map(n => fetchPlayer(n)));

            let html = '';
            results.forEach((r, i) => {
                if (r.status === 'fulfilled') {
                    html += renderCard(r.value);
                } else {
                    html += renderError(names[i], r.reason.message);
                }
            });

            container.innerHTML = html;
            container.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));
            document.getElementById('last-update').textContent =
                'Updated: ' + new Date().toLocaleTimeString();
        }

        function startAutoRefresh() {
            clearInterval(refreshTimer);
            loadAll();
            refreshTimer = setInterval(loadAll, REFRESH_INTERVAL);
        }

        document.getElementById('btn-load').addEventListener('click', startAutoRefresh);
        document.getElementById('nicknames').addEventListener('keydown', e => {
            if (e.key === 'Enter') startAutoRefresh();
        });

        // Initial load
        startAutoRefresh();
    </script>
</body>
</html>
