<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF6 Stats Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Rajdhani:wght@400;600;700&display=swap');
        body {
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 50%, #0d1117 100%);
            min-height: 100vh;
            font-family: 'Rajdhani', sans-serif;
        }
        .hero-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0,212,255,0.15);
        }
        .player-name {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
        }
        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .stat-kd-all { color: #f0883e; }
        .stat-kd-human { color: #d2a8ff; }
        .stat-accuracy { color: #3fb950; }
        .stat-tip {
            cursor: help;
            border-bottom: 1px dotted #8b949e;
        }
        .avatar-img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(0,212,255,0.4);
            object-fit: cover;
        }
        .update-badge {
            font-size: 0.75rem;
            color: #8b949e;
        }
        .spinner-container {
            min-height: 200px;
        }
        .input-glow:focus {
            border-color: #7b2ff7;
            box-shadow: 0 0 0 0.2rem rgba(123,47,247,0.25);
        }
        .error-card {
            background: rgba(248,81,73,0.1);
            border-color: rgba(248,81,73,0.3);
        }
        .error-card .player-name {
            color: #f85149;
        }
        .fav-weapon {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            color: #6e7681;
            font-size: 0.8rem;
        }
        .fav-weapon .weapon-name {
            color: #8b949e;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .fav-weapon img {
            height: 32px;
            filter: brightness(0.7);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stat-card {
            animation: cardIn 0.4s ease-out both;
        }
        .refreshing .stat-card {
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .tags-input {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            min-height: 48px;
            cursor: text;
        }
        .tags-input .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,212,255,0.15);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.9rem;
            color: #00d4ff;
        }
        .tag .tag-remove {
            cursor: pointer;
            opacity: 0.6;
            font-size: 1rem;
            line-height: 1;
        }
        .tag .tag-remove:hover {
            opacity: 1;
        }
        .tags-input input {
            border: none;
            outline: none;
            background: transparent;
            color: #e6edf3;
            font-size: 0.9rem;
            flex: 1;
            min-width: 100px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-4">
            <h1 class="hero-title">BF6 Stats Tracker</h1>
            <p class="text-secondary">Real-time Battlefield 6 player statistics</p>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-lg-8">
                <div class="tags-input form-control bg-dark input-glow" id="tags-container">
                    <input type="text" id="tag-input" placeholder="Add player...">
                </div>
                <div class="text-end mt-2">
                    <span class="update-badge" id="last-update"></span>
                </div>
            </div>
        </div>

        <div id="stats-container" class="row g-4 justify-content-center"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'https://api.gametools.network/bf6/stats/?platform=pc&name=';
        const API_GLOBAL = 'https://api.gametools.network/bfglobal/player/?platform=pc&skip_battlelog=false&name=';
        const REFRESH_INTERVAL = 30000;
        let refreshTimer = null;
        const createdAtCache = {};

        let tags = ['dluhhbiu', 'just_kip', 'vladeskos'];

        function getNicknames() {
            return [...tags];
        }

        function renderTags() {
            const container = document.getElementById('tags-container');
            const input = document.getElementById('tag-input');
            container.querySelectorAll('.tag').forEach(t => t.remove());
            tags.forEach((tag, i) => {
                const el = document.createElement('span');
                el.className = 'tag';
                el.innerHTML = `${escapeHtml(tag)}<span class="tag-remove" data-index="${i}">&times;</span>`;
                container.insertBefore(el, input);
            });
        }

        function addTag(name) {
            name = name.trim();
            if (name && !tags.includes(name)) {
                tags.push(name);
                renderTags();
            }
        }

        function removeTag(index) {
            tags.splice(index, 1);
            renderTags();
        }

        async function fetchPlayer(name) {
            const res = await fetch(API_BASE + encodeURIComponent(name));
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (data.errors) throw new Error(data.errors[0] || 'Player not found');
            return data;
        }

        async function fetchCreatedAt(name) {
            try {
                const res = await fetch(API_GLOBAL + encodeURIComponent(name) + '&_t=' + Date.now());
                if (!res.ok) return null;
                const data = await res.json();
                return data.createdAt || null;
            } catch { return null; }
        }

        function applyCreatedAt(container, name, date) {
            const el = container.querySelector(`.created-at[data-name="${name}"]`);
            if (el) {
                el.innerHTML = ` &middot; <span class="stat-tip" data-bs-toggle="tooltip" data-bs-title="Picked up the weapon on this day">${formatDate(date)}</span>`;
                el.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(t => new bootstrap.Tooltip(t));
            }
        }

        function retryCreatedAt(container, name) {
            fetchCreatedAt(name).then(date => {
                if (date) {
                    createdAtCache[name] = date;
                    applyCreatedAt(container, name, date);
                } else {
                    setTimeout(() => retryCreatedAt(container, name), 5000);
                }
            });
        }

        function renderCard(data, index = 0) {
            const kdHuman = data.deaths ? (data.kills / data.deaths).toFixed(3) : '—';
            const allGroup = (data.gameModeGroups || []).find(g => g.gamemodeName === 'All');
            const kdAll = allGroup && allGroup.deaths ? (allGroup.kills / allGroup.deaths).toFixed(3) : kdHuman;
            return `
                <div class="col-md-6 col-xl-4">
                    <div class="stat-card p-4 h-100" style="animation-delay: ${index * 0.1}s">
                        <div class="d-flex align-items-center mb-3 gap-3">
                            ${data.avatar ? `<img src="${data.avatar}" class="avatar-img" alt="">` : ''}
                            <div>
                                <div class="player-name">${escapeHtml(data.userName)}</div>
                                <div class="text-secondary" style="font-size:0.85rem">
                                    ${data.matchesPlayed ?? 0} matches &middot; ${formatHours(data.secondsPlayed)}<span class="created-at" data-name="${escapeHtml(data.userName)}"></span>
                                </div>
                            </div>
                        </div>
                        <div class="row text-center g-3">
                            <div class="col-4">
                                <div class="stat-label">K/D (All)</div>
                                <div class="stat-value stat-kd-all">${kdAll}</div>
                            </div>
                            <div class="col-4">
                                <div class="stat-label">K/D (Humans)</div>
                                <div class="stat-value stat-kd-human">${kdHuman}</div>
                            </div>
                            <div class="col-4">
                                <div class="stat-label">Accuracy</div>
                                <div class="stat-value stat-accuracy">${data.accuracy ?? '—'}</div>
                            </div>
                        </div>
                        ${renderFavWeapon(data.weapons)}
                    </div>
                </div>`;
        }

        function formatHours(seconds) {
            if (!seconds) return '—';
            const h = Math.round(seconds / 3600);
            return h.toLocaleString() + 'h';
        }

        function formatDate(isoStr) {
            const d = new Date(isoStr);
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function renderFavWeapon(weapons) {
            if (!weapons || !weapons.length) return '';
            const w = weapons.reduce((best, cur) => (cur.kills > best.kills ? cur : best), weapons[0]);
            return `
                <div class="fav-weapon mt-3 p-2 d-flex align-items-center gap-2">
                    ${w.image ? `<img src="${w.image}" alt="">` : ''}
                    <div>
                        <div class="stat-label mb-1">Favorite Weapon</div>
                        <div class="weapon-name">${escapeHtml(w.weaponName)}</div>
                        <span><span class="stat-tip" data-bs-toggle="tooltip" data-bs-title="Kills">${(w.kills ?? 0).toLocaleString()} kills</span> &middot; <span class="stat-tip" data-bs-toggle="tooltip" data-bs-title="Accuracy">${w.accuracy || '—'} acc</span> &middot; <span class="stat-tip" data-bs-toggle="tooltip" data-bs-title="Headshots">${w.headshots || '—'} hs</span></span>
                    </div>
                </div>`;
        }

        function renderError(name, msg, index = 0) {
            return `
                <div class="col-md-6 col-xl-4">
                    <div class="stat-card error-card p-4 h-100" style="animation-delay: ${index * 0.1}s">
                        <div class="player-name mb-2">${escapeHtml(name)}</div>
                        <p class="text-secondary mb-0">${escapeHtml(msg)}</p>
                    </div>
                </div>`;
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        async function loadAll() {
            const names = getNicknames();
            const container = document.getElementById('stats-container');

            if (names.length === 0) {
                container.innerHTML = '<p class="text-center text-secondary">Enter at least one nickname above.</p>';
                return;
            }

            const isFirstLoad = !container.children.length;
            if (isFirstLoad) {
                container.innerHTML = `
                    <div class="spinner-container d-flex justify-content-center align-items-center">
                        <div class="spinner-border text-info" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>`;
            } else {
                container.classList.add('refreshing');
            }

            const results = await Promise.allSettled(names.map(n => fetchPlayer(n)));

            let html = '';
            results.forEach((r, i) => {
                if (r.status === 'fulfilled') {
                    html += renderCard(r.value, i);
                } else {
                    html += renderError(names[i], r.reason.message, i);
                }
            });

            container.innerHTML = html;
            container.classList.remove('refreshing');
            container.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));
            document.getElementById('last-update').textContent =
                'Updated: ' + new Date().toLocaleTimeString();

            // Load creation dates asynchronously, retry every 5s until success
            names.forEach(name => {
                if (createdAtCache[name]) {
                    applyCreatedAt(container, name, createdAtCache[name]);
                    return;
                }
                retryCreatedAt(container, name);
            });
        }

        function startAutoRefresh() {
            clearInterval(refreshTimer);
            loadAll();
            refreshTimer = setInterval(loadAll, REFRESH_INTERVAL);
        }

        document.getElementById('tag-input').addEventListener('keydown', e => {
            const input = e.target;
            if (e.key === 'Enter') {
                e.preventDefault();
                if (input.value.trim()) {
                    addTag(input.value);
                    input.value = '';
                }
                startAutoRefresh();
            } else if (e.key === 'Backspace' && !input.value && tags.length) {
                removeTag(tags.length - 1);
            }
        });

        document.getElementById('tags-container').addEventListener('click', e => {
            if (e.target.classList.contains('tag-remove')) {
                removeTag(parseInt(e.target.dataset.index));
                startAutoRefresh();
            } else {
                document.getElementById('tag-input').focus();
            }
        });

        // Initial render and load
        renderTags();
        startAutoRefresh();
    </script>
</body>
</html>
